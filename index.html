<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros - Motor de Videojuegos HTML5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contenedor {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
        }

        h1 {
            color: #FFD700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 2.5em;
        }

        .subtitulo {
            color: #87CEEB;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        #mundoMario {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 4px solid #333;
            border-radius: 10px;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            max-width: 100%;
            height: auto;
        }

        .controles {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        button:hover:not(:disabled) {
            background: #FF5252;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        button:disabled {
            background: #888;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            color: #FFF;
            border-left: 4px solid #FFD700;
        }

        .info p {
            margin: 8px 0;
            font-size: 0.95em;
        }

        .estadisticas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            color: #00FF00;
            font-family: monospace;
        }

        .stat strong {
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>🎮 SUPER MARIO BROS</h1>
        <p class="subtitulo">Motor de Videojuegos HTML5 - Nivel 1-1</p>
        
        <canvas id="mundoMario"></canvas>
        
        <div class="controles">
            <button id="btnIniciar">▶️ Iniciar Nivel</button>
            <button id="btnReiniciar" disabled>🔄 Reiniciar</button>
        </div>

        <div class="info">
            <p><strong>Controles:</strong> BARRA ESPACIADORA para saltar</p>
            <p><strong>Arquitectura:</strong> 5 módulos independientes (Clean Code)</p>
            <div class="estadisticas">
                <div class="stat"><strong>FPS:</strong> <span id="fps">0</span></div>
                <div class="stat"><strong>APS:</strong> <span id="aps">0</span></div>
                <div class="stat"><strong>Δt:</strong> <span id="deltaTime">0</span>ms</div>
                <div class="stat"><strong>Resolución:</strong> <span id="resolucion">0x0</span></div>
            </div>
        </div>
    </div>

    <!-- Módulos en orden correcto de carga (dependencias) -->
    <script src="medidas.js"></script>
    <script src="evento.js"></script>
    <script src="render.js"></script>
    <script src="bucle.js"></script>
</body>
</html>
